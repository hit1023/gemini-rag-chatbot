apiVersion: apps/v1
kind: Deployment
metadata:
  name: webui
  namespace: ragchat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webui
  template:
    metadata:
      labels:
        app: webui
    spec:
      containers:
        - name: webui
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
      volumes:
        - name: html
          configMap:
            name: webui-html
        - name: nginx-conf
          configMap:
            name: webui-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: webui
  namespace: ragchat
spec:
  type: NodePort
  selector:
    app: webui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
