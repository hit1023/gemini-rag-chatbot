<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Chatbot</title>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3248;
      --accent: #4f8ef7;
      --accent-hover: #6fa3ff;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --success: #34d399;
      --error: #f87171;
      --radius: 12px;
    }

    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

    /* ===== ログイン画面 ===== */
    #login-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 360px;
    }
    .login-card h1 { font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 8px; text-align: center; }
    .login-card p { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 28px; }
    .login-tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--surface2); border-radius: 8px; padding: 4px; }
    .login-tab {
      flex: 1; padding: 8px; text-align: center; cursor: pointer;
      border-radius: 6px; font-size: 14px; color: var(--text-muted); transition: all 0.2s;
    }
    .login-tab.active { background: var(--accent); color: white; }
    .login-field { margin-bottom: 16px; }
    .login-field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .login-field input {
      width: 100%; padding: 10px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; outline: none;
    }
    .login-field input:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%; padding: 12px; background: var(--accent);
      border: none; border-radius: 8px; color: white;
      font-size: 15px; cursor: pointer; font-weight: 600; transition: background 0.2s;
    }
    .login-btn:hover { background: var(--accent-hover); }
    .login-error { color: var(--error); font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }

    /* ===== メインUI ===== */
    #app { display: none; width: 100%; }
    #app.visible { display: flex; }

    .sidebar {
      width: 300px; min-width: 300px;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 20px; gap: 20px; overflow-y: auto;
    }
    .sidebar-header { display: flex; align-items: center; justify-content: space-between; }
    .sidebar-title { font-size: 16px; font-weight: 700; color: var(--accent); }
    .user-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted);
    }
    .logout-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 12px; padding: 4px 8px;
      border-radius: 4px; transition: all 0.2s;
    }
    .logout-btn:hover { color: var(--error); }

    .section-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }

    .drop-zone {
      border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface2);
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(79,142,247,0.08); }
    .drop-zone .icon { font-size: 28px; margin-bottom: 6px; }
    .drop-zone .label { font-size: 13px; color: var(--text-muted); }
    .drop-zone .formats { font-size: 11px; color: var(--text-muted); margin-top: 4px; opacity: 0.6; }
    .drop-zone input[type="file"] { display: none; }
    .upload-status { margin-top: 8px; font-size: 12px; min-height: 18px; color: var(--text-muted); }
    .upload-status.success { color: var(--success); }
    .upload-status.error { color: var(--error); }

    .prompt-textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 12px;
      line-height: 1.6; padding: 10px; resize: vertical; min-height: 130px;
      outline: none; font-family: inherit;
    }
    .prompt-textarea:focus { border-color: var(--accent); }
    .prompt-save-btn {
      margin-top: 6px; width: 100%; padding: 8px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      cursor: pointer; font-size: 12px; transition: all 0.2s;
    }
    .prompt-save-btn:hover { border-color: var(--accent); color: var(--accent); }

    .doc-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 10px; font-size: 12px; gap: 6px;
    }
    .doc-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .doc-item-chunks { color: var(--text-muted); white-space: nowrap; }
    .doc-item-del { background: none; border: none; color: var(--error); cursor: pointer; font-size: 13px; opacity: 0.7; transition: opacity 0.2s; }
    .doc-item-del:hover { opacity: 1; }
    .danger-btn {
      width: 100%; padding: 8px; background: transparent;
      border: 1px solid #5a2020; border-radius: 8px;
      color: var(--error); cursor: pointer; font-size: 12px; transition: all 0.2s;
    }
    .danger-btn:hover { background: rgba(248,113,113,0.1); }

    .new-session-btn {
      width: 100%; padding: 8px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      cursor: pointer; font-size: 12px; transition: all 0.2s;
    }
    .new-session-btn:hover { border-color: var(--accent); color: var(--accent); }

    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    header { padding: 14px 24px; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text-muted); }

    #chat-window { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .bubble-wrap { display: flex; flex-direction: column; }
    .bubble-wrap.user { align-items: flex-end; }
    .bubble-wrap.assistant { align-items: flex-start; }
    .bubble { max-width: 72%; padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.7; white-space: pre-wrap; }
    .bubble-wrap.user .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .bubble-wrap.assistant .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .contexts { font-size: 11px; color: var(--text-muted); margin-top: 4px; max-width: 72%; opacity: 0.6; }
    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; width: fit-content; }
    .typing-indicator span { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    .input-bar { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
    #msg-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: 15px;
      padding: 12px 16px; outline: none; resize: none;
      min-height: 48px; max-height: 120px; font-family: inherit; line-height: 1.5;
    }
    #msg-input:focus { border-color: var(--accent); }
    #send-btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-size: 15px; transition: background 0.2s; height: 48px; }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { background: var(--border); cursor: default; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ===== Thinkingステータスバー ===== */
    #thinking-bar {
      display: none;
      border-top: 1px solid var(--border);
      background: linear-gradient(135deg, #1a1d27 0%, #1e2235 100%);
      padding: 8px 20px;
      overflow: hidden;
    }
    #thinking-bar.visible { display: block; }
    .thinking-label {
      font-size: 10px; color: var(--accent); text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 4px; display: flex; align-items: center; gap: 6px;
    }
    .thinking-dot {
      width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
    #thinking-text {
      font-size: 12px; color: var(--text-muted); line-height: 1.5;
      max-height: 60px; overflow: hidden;
      mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
      white-space: pre-wrap; word-break: break-all;
    }
  </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-card">
    <h1>🤖 RAG Chatbot</h1>
    <p>ログインまたはアカウント作成</p>
    <div class="login-tabs">
      <div class="login-tab active" id="tab-login">ログイン</div>
      <div class="login-tab" id="tab-register">新規登録</div>
    </div>
    <div class="login-field">
      <label>ユーザー名</label>
      <input type="text" id="login-username" placeholder="username" autocomplete="username">
    </div>
    <div class="login-field">
      <label>パスワード</label>
      <input type="password" id="login-password" placeholder="password" autocomplete="current-password">
    </div>
    <button class="login-btn" id="login-btn">ログイン</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- メインアプリ -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">🤖 RAG Chatbot</div>
      <div class="user-badge">
        <span id="username-display"></span>
        <button class="logout-btn" id="logout-btn">ログアウト</button>
      </div>
    </div>

    <div>
      <div class="section-title">📄 ナレッジ追加</div>
      <div class="drop-zone" id="drop-zone">
        <div class="icon">📂</div>
        <div class="label">クリックまたはドラッグ＆ドロップ</div>
        <div class="formats">PDF / TXT 対応</div>
        <input type="file" id="file-input" accept=".pdf,.txt">
      </div>
      <div class="upload-status" id="upload-status"></div>
    </div>

    <div>
      <div class="section-title">✏️ システムプロンプト</div>
      <textarea class="prompt-textarea" id="prompt-textarea">あなたは親切なアシスタントです。
以下の「ユーザー情報」はチャット相手のユーザー自身に関する登録情報です。
「あなた」という言葉が出た場合はチャット相手のユーザーを指します。
この情報と会話履歴を踏まえて質問に答えてください。</textarea>
      <button class="prompt-save-btn" id="prompt-save-btn">✅ プロンプトを保存</button>
    </div>

    <div>
      <div class="section-title">📋 登録済みドキュメント</div>
      <div id="docs-list" style="display:flex;flex-direction:column;gap:6px;"></div>
      <div id="docs-empty" style="font-size:12px;color:var(--text-muted);display:none;">ドキュメントなし</div>
      <button class="danger-btn" id="clear-docs-btn" style="margin-top:8px;">🗑️ 全て削除</button>
    </div>

    <div>
      <div class="section-title">💬 会話</div>
      <button class="new-session-btn" id="new-session-btn">＋ 新しい会話を始める</button>
    </div>
  </div>

  <div class="main">
    <header id="chat-header">会話</header>
    <div id="chat-window"></div>
    <div id="thinking-bar">
      <div class="thinking-label"><div class="thinking-dot"></div>Thinking...</div>
      <div id="thinking-text"></div>
    </div>
    <div class="input-bar">
      <textarea id="msg-input" placeholder="メッセージを入力…" rows="1"></textarea>
      <button id="send-btn">送信</button>
    </div>
  </div>
</div>

<script>
  let token = localStorage.getItem("rag_token") || "";
  let username = localStorage.getItem("rag_username") || "";
  let sessionId = localStorage.getItem("rag_session_id") || "";
  let systemPrompt = document.getElementById("prompt-textarea").value;

  // ===== 起動時 =====
  if (token) showApp();

  function showApp() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").classList.add("visible");
    document.getElementById("username-display").textContent = username;
    loadDocs();
  }

  function authHeaders() {
    return { "Content-Type": "application/json", "Authorization": `Bearer ${token}` };
  }

  // ===== ログイン・登録 =====
  let isRegisterMode = false;

  document.getElementById("tab-login").addEventListener("click", () => {
    isRegisterMode = false;
    document.getElementById("tab-login").classList.add("active");
    document.getElementById("tab-register").classList.remove("active");
    document.getElementById("login-btn").textContent = "ログイン";
  });
  document.getElementById("tab-register").addEventListener("click", () => {
    isRegisterMode = true;
    document.getElementById("tab-register").classList.add("active");
    document.getElementById("tab-login").classList.remove("active");
    document.getElementById("login-btn").textContent = "アカウント作成";
  });

  document.getElementById("login-btn").addEventListener("click", async () => {
    const u = document.getElementById("login-username").value.trim();
    const p = document.getElementById("login-password").value;
    const errEl = document.getElementById("login-error");
    errEl.textContent = "";
    if (!u || !p) { errEl.textContent = "ユーザー名とパスワードを入力してください"; return; }

    const endpoint = isRegisterMode ? "/api/auth/register" : "/api/auth/login";
    try {
      const res = await fetch(endpoint, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: u, password: p }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.detail || "エラーが発生しました"; return; }
      token = data.token;
      username = data.username;
      localStorage.setItem("rag_token", token);
      localStorage.setItem("rag_username", username);
      localStorage.removeItem("rag_session_id");
      sessionId = "";
      showApp();
    } catch (e) {
      errEl.textContent = "サーバーに接続できません";
    }
  });

  // Enterキーでログイン
  ["login-username", "login-password"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("login-btn").click();
    });
  });

  document.getElementById("logout-btn").addEventListener("click", () => {
    localStorage.removeItem("rag_token");
    localStorage.removeItem("rag_username");
    localStorage.removeItem("rag_session_id");
    location.reload();
  });

  // ===== チャット =====
  const chatWindow = document.getElementById("chat-window");
  const msgInput = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");

  function addBubble(role, text, contexts) {
    const wrap = document.createElement("div");
    wrap.className = `bubble-wrap ${role}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    wrap.appendChild(bubble);
    if (contexts && contexts.length) {
      const ctx = document.createElement("div");
      ctx.className = "contexts";
      ctx.textContent = "参考: " + contexts.join(" / ");
      wrap.appendChild(ctx);
    }
    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap assistant";
    wrap.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return wrap;
  }

  const thinkingBar = document.getElementById("thinking-bar");
  const thinkingText = document.getElementById("thinking-text");

  function showThinkingBar(text) {
    thinkingText.textContent = text || "考え中...";
    thinkingBar.classList.add("visible");
    thinkingBar.scrollTop = thinkingBar.scrollHeight;
  }

  function hideThinkingBar() {
    thinkingBar.classList.remove("visible");
    thinkingText.textContent = "";
  }

  async function sendMessage() {
    const msg = msgInput.value.trim();
    if (!msg) return;
    addBubble("user", msg);
    msgInput.value = "";
    msgInput.style.height = "48px";
    sendBtn.disabled = true;
    const typing = showTyping();
    showThinkingBar("考え中...");
    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({ message: msg, session_id: sessionId, system_prompt: systemPrompt }),
      });
      if (res.status === 401) { alert("セッションが切れました。再ログインしてください"); location.reload(); return; }
      const data = await res.json();
      sessionId = data.session_id;
      localStorage.setItem("rag_session_id", sessionId);
      typing.remove();
      // thinking があればバーに表示してから少し後に消す
      if (data.thinking) {
        showThinkingBar(data.thinking);
        addBubble("assistant", data.answer, data.contexts);
        setTimeout(hideThinkingBar, 4000);
      } else {
        hideThinkingBar();
        addBubble("assistant", data.answer, data.contexts);
      }
      loadDocs();
    } catch (e) {
      typing.remove();
      hideThinkingBar();
      addBubble("assistant", "エラーが発生しました。もう一度お試しください。");
    }
    sendBtn.disabled = false;
    msgInput.focus();
  }

  sendBtn.addEventListener("click", sendMessage);
  msgInput.addEventListener("input", () => {
    msgInput.style.height = "auto";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
  });

  // 新しい会話
  document.getElementById("new-session-btn").addEventListener("click", () => {
    if (!confirm("新しい会話を始めますか？現在の会話履歴はサーバーに保存されています。")) return;
    sessionId = "";
    localStorage.removeItem("rag_session_id");
    chatWindow.innerHTML = "";
  });

  // ===== ファイルアップロード =====
  const dropZone = document.getElementById("drop-zone");
  const fileInput = document.getElementById("file-input");
  const uploadStatus = document.getElementById("upload-status");

  dropZone.addEventListener("click", () => fileInput.click());
  dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("drag-over"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
  dropZone.addEventListener("drop", (e) => { e.preventDefault(); dropZone.classList.remove("drag-over"); if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener("change", () => { if (fileInput.files[0]) uploadFile(fileInput.files[0]); fileInput.value = ""; });

  async function uploadFile(file) {
    uploadStatus.className = "upload-status";
    uploadStatus.textContent = `⏳ アップロード中: ${file.name}`;
    const form = new FormData();
    form.append("file", file);
    try {
      const res = await fetch("/api/upload", { method: "POST", headers: { "Authorization": `Bearer ${token}` }, body: form });
      const data = await res.json();
      uploadStatus.className = "upload-status success";
      uploadStatus.textContent = `✅ ${data.message}`;
      loadDocs();
    } catch (e) {
      uploadStatus.className = "upload-status error";
      uploadStatus.textContent = `❌ アップロード失敗`;
    }
  }

  // ===== プロンプト =====
  document.getElementById("prompt-save-btn").addEventListener("click", () => {
    systemPrompt = document.getElementById("prompt-textarea").value;
    const btn = document.getElementById("prompt-save-btn");
    btn.textContent = "✅ 保存しました！";
    setTimeout(() => btn.textContent = "✅ プロンプトを保存", 2000);
  });

  // ===== ドキュメント一覧 =====
  async function loadDocs() {
    const res = await fetch("/api/documents", { headers: authHeaders() });
    const data = await res.json();
    const list = document.getElementById("docs-list");
    const empty = document.getElementById("docs-empty");
    list.innerHTML = "";
    if (data.documents.length === 0) { empty.style.display = "block"; return; }
    empty.style.display = "none";
    data.documents.forEach(doc => {
      const item = document.createElement("div");
      item.className = "doc-item";
      item.innerHTML = `<span class="doc-item-name" title="${doc.filename}">${doc.filename}</span><span class="doc-item-chunks">${doc.chunks}件</span><button class="doc-item-del">🗑</button>`;
      item.querySelector(".doc-item-del").addEventListener("click", async () => {
        if (!confirm(`「${doc.filename}」を削除しますか？`)) return;
        await fetch(`/api/documents/${encodeURIComponent(doc.filename)}`, { method: "DELETE", headers: authHeaders() });
        loadDocs();
      });
      list.appendChild(item);
    });
  }

  document.getElementById("clear-docs-btn").addEventListener("click", async () => {
    if (!confirm("全ドキュメントを削除しますか？")) return;
    await fetch("/api/documents", { method: "DELETE", headers: authHeaders() });
    loadDocs();
  });
</script>
</body>
</html>
