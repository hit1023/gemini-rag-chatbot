services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./app
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      POSTGRES_DSN: postgresql://raguser:ragpass@postgres:5432/ragdb
    ports:
      - "8030:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app

  webui:
    image: nginx:alpine
    ports:
      - "8031:80"
    volumes:
      - ./webui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./webui/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - api

volumes:
  postgres_data:
